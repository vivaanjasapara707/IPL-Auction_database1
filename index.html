<!DOCTYPE html>
<html>

<head>
<title>IPL Auction Dashboard</title>

<style>

body{
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
font-family: Arial;
color:white;
margin:0;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
font-size:28px;
font-weight:bold;
}

.user{
font-size:18px;
}

.logout{
background:#ff512f;
padding:8px 14px;
border-radius:5px;
text-decoration:none;
color:white;
margin-left:10px;
}

.filters{
text-align:center;
margin-bottom:20px;
}

.filters a{
color:white;
margin:10px;
padding:10px 15px;
background:#ff512f;
border-radius:6px;
text-decoration:none;
}

.container{
display:flex;
justify-content:center;
}

table{
border-collapse:collapse;
width:90%;
background:white;
color:black;
border-radius:10px;
overflow:hidden;
}

th{
background:#ff512f;
color:white;
padding:12px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #ddd;
}

.player{
font-weight:bold;
}

.role{
color:#2980b9;
font-weight:bold;
}

.price{
color:#27ae60;
font-weight:bold;
}

input{
padding:5px;
width:80px;
}

button{
background:#ff512f;
color:white;
border:none;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<div>
🏏 IPL LIVE AUCTION DASHBOARD
</div>

<div class="user">
👤 {{ user }}
<a class="logout" href="/logout">Logout</a>
</div>

</div>

<div class="filters">

<a href="/">All</a>
<a href="/role/Batsman">Batsman</a>
<a href="/role/Bowler">Bowler</a>
<a href="/role/Wicket Keeper">Wicket Keeper</a>
<a href="/role/All Rounder">All Rounder</a>

</div>

<div class="container">

<table>

<tr>
<th>Player</th>
<th>Country</th>
<th>Role</th>
<th>Base Price</th>
<th>Current Bid</th>
<th>Bid</th>
</tr>

{% for p in players %}

<tr>

<td class="player">{{p[1]}}</td>
<td>{{p[2]}}</td>
<td class="role">{{p[3]}}</td>
<td>₹ {{p[4]}} L</td>
<td class="price">₹ {{p[5]}} L</td>

<td>

<form action="/bid/{{p[0]}}" method="post">

<input type="number" name="bid" required>

<button type="submit">Bid</button>

</form>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
