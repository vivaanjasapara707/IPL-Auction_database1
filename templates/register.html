<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>

body{
background:#0f2027;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#203a43;
padding:40px;
border-radius:10px;
text-align:center;
}

input{
padding:10px;
margin:10px;
width:200px;
}

button{
padding:10px 20px;
background:#ff512f;
border:none;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>Create Account</h2>

<form method="POST">

<input name="username" placeholder="Username" required><br>
<input type="password" name="password" placeholder="Password" required><br>

<button type="submit">Register</button>

</form>

</div>

</body>
</html>
